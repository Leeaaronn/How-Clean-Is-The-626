name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          test -f requirements.txt
          python -m pip install -r requirements.txt

      - name: Run pipeline
        shell: bash
        run: |
          set -euo pipefail
          make ingest
          make filter_626
          make stage
          make core
          make marts
          make geo_near_me

      - name: Validate
        shell: bash
        run: |
          set -euo pipefail
          make validate

      - name: Tests
        shell: bash
        run: |
          set -euo pipefail
          make test